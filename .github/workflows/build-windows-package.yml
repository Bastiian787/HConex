name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        shell: pwsh
        run: |
          & mvn '-B' 'clean' 'package' '-Dmaven.test.skip=true'

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build Windows EXE with jpackage
        shell: pwsh
        run: |
          # Prepare folders
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          New-Item -Path target/app-input -ItemType Directory -Force | Out-Null
          
          # Find the compiled JAR (not original)
          $jar = Get-ChildItem target/*.jar | Where-Object { $_.Name -notlike '*original*' } | Select-Object -First 1
          
          if (-not $jar) {
            Write-Error "JAR not found in target/"
            Get-ChildItem target/
            exit 1
          }
          
          Write-Output "Found JAR: $($jar.Name)"
          Copy-Item $jar.FullName -Destination target/app-input/hconex.jar -Force
          
          # Copy dependencies to app input
          if (Test-Path target/dependency) {
            $dependencies = Get-ChildItem target/dependency/*.jar -ErrorAction SilentlyContinue
            if ($dependencies) {
              Copy-Item target/dependency/*.jar -Destination target/app-input/ -Force
              Write-Output "Copied $($dependencies.Count) dependencies"
            } else {
              Write-Warning "target/dependency exists but contains no jar files"
            }
          } else {
            Write-Warning "No dependencies found - this might be OK if all is embedded"
          }

          # Build real EXE installer with bundled runtime
          jpackage `
            --type exe `
            --name HConex `
            --input target/app-input `
            --main-jar hconex.jar `
            --main-class com.hconex.Application `
            --dest dist `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser

          Write-Output "EXE package created successfully"
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HConex-Windows-EXE
          path: dist/
