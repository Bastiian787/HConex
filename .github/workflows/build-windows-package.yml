name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        shell: pwsh
        run: mvn -B clean package -DskipTests

      - name: Create distribution package
        shell: pwsh
        run: |
          # Create output directory
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          
          # Find the JAR file
          $jar = Get-ChildItem target/HConex-*.jar | Where-Object { $_.Name -notlike '*original*' } | Select-Object -First 1
          
          if (-not $jar) {
            Write-Error "JAR file not found!"
            exit 1
          }
          
          Write-Output "Found JAR: $($jar.Name)"
          Copy-Item $jar.FullName -Destination dist/HConex.jar
          
          # Create batch launcher
          $batContent = @'
          @echo off
          REM HConex Launcher
          setlocal enabledelayedexpansion
          
          REM Get the directory where this batch file is located
          set SCRIPT_DIR=%~dp0
          
          REM Execute the JAR
          java -jar "!SCRIPT_DIR!HConex.jar"
          
          if errorlevel 1 (
            echo.
            echo ERROR: Failed to start HConex
            echo Make sure Java 11+ is installed and in your PATH
            pause
          )
          '@
          
          Set-Content -Path dist/HConex.bat -Value $batContent -Encoding ASCII
          
          Write-Output "Package created successfully!"
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HConex-Windows
          path: dist/
