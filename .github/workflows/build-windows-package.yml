name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        shell: pwsh
        run: mvn -B clean package -DskipTests

      - name: List JARs generated
        shell: pwsh
        run: Get-ChildItem target\*.jar

      - name: Detect runnable JAR
        id: jar
        shell: pwsh
        run: |
          $jars = Get-ChildItem target\*.jar | Where-Object { $_.Name -notlike 'original-*' }
          if ($jars.Count -eq 0) { 
            Write-Error "No runnable jar found in target"
            exit 1 
          }
          $jar = $jars | Select-Object -First 1
          Write-Output "Found JAR: $($jar.Name)"
          "name=$($jar.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install WiX (for EXE)
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build EXE with jpackage
        shell: pwsh
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          $jarName = "${{ steps.jar.outputs.name }}"
          Write-Output "Building EXE with JAR: $jarName"
          jpackage --type exe --name HConex --input target --main-jar $jarName --main-class com.hconex.Application --dest dist --win-shortcut --win-menu --win-dir-chooser --win-console

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hconex-windows-package
          path: dist/**
