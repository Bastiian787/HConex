name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        shell: pwsh
        run: mvn -B clean package -DskipTests

      - name: Create distribution package
        shell: pwsh
        run: |
          # Create output directory
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          New-Item -Path dist/lib -ItemType Directory -Force | Out-Null
          
          # Find the compiled JAR (not original)
          $jar = Get-ChildItem target/*.jar | Where-Object { $_.Name -notlike '*original*' } | Select-Object -First 1
          
          if (-not $jar) {
            Write-Error "JAR not found in target/"
            Get-ChildItem target/
            exit 1
          }
          
          Write-Output "Found JAR: $($jar.Name)"
          Copy-Item $jar.FullName -Destination dist/hconex.jar
          
          # Copy dependencies to lib/ directory
          if (Test-Path target/dependency) {
            $dependencies = Get-ChildItem target/dependency/*.jar -ErrorAction SilentlyContinue
            if ($dependencies) {
              Copy-Item target/dependency/*.jar -Destination dist/lib/ -Force
              Write-Output "Copied $((Get-ChildItem dist/lib/*.jar).Count) dependencies"
            } else {
              Write-Warning "target/dependency exists but contains no jar files"
            }
          } else {
            Write-Warning "No dependencies found - this might be OK if all is embedded"
          }
          
          # Create batch launcher
          $batContent = @"
          @echo off
          REM HConex Launcher - double-click to run
          setlocal enabledelayedexpansion
          
          REM Get the directory where this batch file is located
          set SCRIPT_DIR=%~dp0
          
          REM Check if Java is available
          java -version >nul 2>&1
          if errorlevel 1 (
            echo.
            echo ERROR: Java is not installed or not in PATH
            echo Please install Java 11 or later from:
            echo https://www.oracle.com/java/technologies/javase-jdk11-downloads.html
            pause
            exit /b 1
          )
          
          REM Execute the JAR with dependencies in classpath
          set "CLASSPATH=!SCRIPT_DIR!hconex.jar"
          if exist "!SCRIPT_DIR!lib" (
            for /r "!SCRIPT_DIR!lib" %%f in (*.jar) do set "CLASSPATH=!CLASSPATH!;%%f"
          )
          java -cp "!CLASSPATH!" com.hconex.Application
          
          if errorlevel 1 (
            echo.
            echo ERROR: Failed to start HConex
            pause
          )
          "@
          
          Set-Content -Path dist/HConex.bat -Value $batContent -Encoding ASCII
          
          Write-Output "Package created successfully!"
          Get-ChildItem dist -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HConex-Windows
          path: dist/
